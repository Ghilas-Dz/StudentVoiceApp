services:
  - type: web
    name: student-voice-backend
    env: docker
    region: frankfurt
    plan: free
    rootDir: backend
    preDeployCommand: /app/bin/migrate
    healthCheckPath: /api/health # ou une route existante
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-voice-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: student-voice-db
    region: frankfurt
    plan: free
